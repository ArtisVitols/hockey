<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hockey</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #06080c;
        font-family: system-ui, sans-serif;
      }
      #app {
        width: 100%;
        height: 100%;
      }
      #app canvas {
        display: block;
      }
      #backend-badge {
        position: fixed;
        top: 10px;
        right: 10px;
        padding: 4px 10px;
        border-radius: 4px;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.5px;
        color: #fff;
        background: rgba(0, 0, 0, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.25);
        pointer-events: none;
        z-index: 10;
      }
      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #cfd8e3;
        font-size: 15px;
        letter-spacing: 1px;
        z-index: 20;
        background: #06080c;
        transition: opacity 0.4s;
      }
      #loading.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #scoreboard {
        position: fixed;
        top: 14px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 8px 18px;
        border-radius: 8px;
        background: rgba(8, 12, 20, 0.78);
        border: 1px solid rgba(255, 255, 255, 0.16);
        color: #eef2f8;
        font-size: 17px;
        font-weight: 700;
        letter-spacing: 1px;
        z-index: 15;
        pointer-events: none;
        font-variant-numeric: tabular-nums;
      }
      #scoreboard .clock {
        color: #ffd166;
        min-width: 52px;
        text-align: center;
      }
      #scoreboard .team-a {
        color: #7fa8ff;
      }
      #scoreboard .team-b {
        color: #ff8a96;
      }
      #hud-banner {
        position: fixed;
        top: 12%;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 64px;
        font-weight: 800;
        letter-spacing: 6px;
        color: #ff2e44;
        text-shadow: 0 0 24px rgba(255, 46, 68, 0.7);
        opacity: 0;
        transition: opacity 0.25s;
        pointer-events: none;
        z-index: 15;
      }
      #hud-banner.show {
        opacity: 1;
      }
      #charge {
        position: fixed;
        bottom: 26px;
        left: 50%;
        transform: translateX(-50%);
        width: 220px;
        height: 10px;
        border-radius: 5px;
        background: rgba(255, 255, 255, 0.15);
        overflow: hidden;
        z-index: 15;
        pointer-events: none;
      }
      #charge-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #ffd166, #ff2e44);
        border-radius: 5px;
      }
      #menu,
      #pause-menu {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(4, 7, 12, 0.55);
        backdrop-filter: blur(3px);
        z-index: 30;
        transition: opacity 0.3s;
      }
      #menu.hidden,
      #pause-menu.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .menu-card {
        background: rgba(10, 15, 24, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 14px;
        padding: 36px 44px;
        text-align: center;
        color: #e8eef6;
        box-shadow: 0 22px 70px rgba(0, 0, 0, 0.6);
      }
      .menu-card h1 {
        margin: 0 0 24px;
        font-size: 34px;
        letter-spacing: 8px;
        font-weight: 800;
        color: #fff;
        text-shadow: 0 0 30px rgba(102, 170, 255, 0.5);
      }
      .menu-row {
        display: flex;
        align-items: center;
        gap: 8px;
        justify-content: center;
        margin: 10px 0;
      }
      .menu-row span {
        width: 90px;
        text-align: right;
        margin-right: 8px;
        opacity: 0.7;
        font-size: 14px;
      }
      .menu-card button {
        background: rgba(255, 255, 255, 0.08);
        color: #dfe8f4;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 7px;
        padding: 7px 16px;
        font-size: 14px;
        cursor: pointer;
      }
      .menu-card button:hover {
        background: rgba(255, 255, 255, 0.16);
      }
      .menu-card button.sel {
        background: #1d4f93;
        border-color: #4d8fe0;
      }
      .menu-start {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin: 26px 0 14px;
      }
      .menu-card button.big {
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 2px;
        padding: 13px;
        background: #b01020;
        border-color: #e04858;
      }
      .menu-card button.big:hover {
        background: #d01830;
      }
      .menu-card button.big.ghost {
        background: rgba(255, 255, 255, 0.07);
        border-color: rgba(255, 255, 255, 0.2);
        font-weight: 500;
      }
      .menu-card button.big small {
        opacity: 0.65;
        font-weight: 400;
        letter-spacing: 0;
      }
      .menu-help {
        margin: 6px 0 0;
        font-size: 12px;
        opacity: 0.55;
      }
      .menu-card button.link {
        background: none;
        border: none;
        color: #7fa8ff;
        font-size: 14px;
        letter-spacing: 1px;
        margin-top: 12px;
        text-decoration: underline;
        text-underline-offset: 3px;
      }
      .menu-card button.link:hover {
        background: none;
        color: #a8c8ff;
      }
      .controls-card {
        max-height: 88vh;
        overflow-y: auto;
        max-width: 640px;
      }
      .ctl-tabs {
        display: flex;
        gap: 8px;
        justify-content: center;
        margin-bottom: 18px;
      }
      .ctl-section {
        display: none;
      }
      .ctl-section.show {
        display: block;
      }
      kbd.key {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 32px;
        height: 32px;
        padding: 0 8px;
        border-radius: 6px;
        background: linear-gradient(#2a3242, #1a2130);
        border: 1px solid rgba(255, 255, 255, 0.28);
        border-bottom-width: 3px;
        font-family: system-ui, sans-serif;
        font-size: 13px;
        font-weight: 700;
        color: #e8eef6;
      }
      kbd.key.wide {
        min-width: 64px;
      }
      .key-cluster {
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        margin: 4px 18px 10px;
        vertical-align: top;
      }
      .key-cluster .krow {
        display: flex;
        gap: 4px;
      }
      .key-cluster .kcap {
        font-size: 11px;
        opacity: 0.6;
        margin-top: 4px;
        letter-spacing: 1px;
      }
      .ctl-rows {
        margin: 8px auto 0;
        max-width: 540px;
        text-align: left;
      }
      .ctl-row {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 4px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }
      .ctl-row .keys {
        min-width: 150px;
        display: flex;
        gap: 4px;
        justify-content: flex-end;
        align-items: center;
        flex-shrink: 0;
      }
      .ctl-row .keys .or {
        font-size: 11px;
        opacity: 0.5;
        margin: 0 2px;
      }
      .ctl-row .desc {
        font-size: 13px;
        opacity: 0.85;
      }
      .ctl-row .desc small {
        opacity: 0.6;
      }
      .ctl-head {
        font-size: 12px;
        letter-spacing: 2px;
        opacity: 0.55;
        margin: 14px 0 4px;
        text-transform: uppercase;
      }
      .gamepad-svg {
        margin: 6px auto;
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="backend-badge"></div>
    <div id="scoreboard">
      <span class="team-a" id="sb-a">GLA 0</span>
      <span class="clock" id="sb-clock">3:00</span>
      <span class="team-b" id="sb-b">0 NOR</span>
      <span id="sb-period">P1</span>
    </div>
    <div id="hud-banner">GOAL!</div>
    <div id="charge"><div id="charge-fill"></div></div>
    <div id="loading">BUILDING THE RINK…</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
